value: EssentialSSL là chứng chỉ mã hóa đơn giản cho website, là một trong những tùy
  chọn hợp lý trên thị trường. Chứng chỉ này có thể được cấp trong vài phút với mã
  hóa mạnh. Các miền được bảo vệ bởi chứng chỉ này sẽ hiển thị "https" trên URL, cùng
  với biểu tượng ổ khóa và Dấu trang (Site Seal). Tính năng chính của chứng chỉ này
  là tốc độ phát hành nhanh, phù hợp cho các miền thử nghiệm nội bộ và các trang web
  thương mại điện tử nhẹ.
