---
artifact: test-set
part: 01
created: 2026-04-13
purpose: |
  Bộ benchmark cho regression v0.3 → v0.4. Mỗi category có 1 wiki page chính
  + 4 claims đại diện (mix verified/normal). Khi rebuild bằng Gemini 3.1 + GPT-5.4
  (PART 07), output mới phải khớp expected_value cho tất cả claims này.
selection_seed: 42
total_pages: 5
total_claims: 20
verified_claims: 8       # ground-truth từ Excel/screenshot
normal_claims: 12        # confidence high nhưng chưa human-verify

acceptance_threshold:
  exact_value_match: ">= 18/20 (90%)"
  unit_must_match: "100%"
  page_compile_no_self_review_block: "5/5"

