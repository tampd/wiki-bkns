# BKNS Wiki Data Portal — upload.trieuphu.biz
# Nginx reverse proxy with SSL

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=wiki_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=wiki_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=wiki_upload:10m rate=2r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name upload.trieuphu.biz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name upload.trieuphu.biz;

    # SSL certificates (will be populated by certbot)
    ssl_certificate /etc/letsencrypt/live/upload.trieuphu.biz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/upload.trieuphu.biz/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    # ssl_stapling on;  # Disabled: LE certs may not have OCSP responder URL
    # ssl_stapling_verify on;

    # Security headers
    server_tokens off;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Body size for file uploads (50MB)
    client_max_body_size 55m;
    client_body_timeout 120;
    client_header_timeout 12;
    send_timeout 60;

    # Upload rate limiting
    location /api/upload {
        limit_req zone=wiki_upload burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # Login rate limiting (stricter)
    location /api/login {
        limit_req zone=wiki_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API rate limiting
    location /api/ {
        limit_req zone=wiki_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files + SPA fallback
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets
        proxy_cache_valid 200 1h;
    }
}
